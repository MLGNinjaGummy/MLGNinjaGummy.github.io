<html>
  
<head>
  <script src="https://cdn.jsdelivr.net/npm/p5@0.10.2/lib/p5.js"></script>
  <style>
  body {
    margin: 0;
    padding: 0;
  }
  </style>
</head>

<body>
  <script>
  var w = window.innerWidth;
  var h = window.innerHeight;
function setup() {
  //Space created by X and Y
  createCanvas(w, h, WEBGL);
}

function draw() {
  background('red');
  //rect(100,100, mouseX,mouseY);
  fill('blue');
  noStroke();
  //rotatung around the Y axis when mouse moved horizontally
  rotateY(mouseX/100);
  //rotating around the X axis when mouse moved vertically
  rotateX(mouseY/100)
  triangle(30, 75, 58, 20, 86, 75);
}
</script>
</body>
</html>
